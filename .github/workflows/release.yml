name: Release

# Two triggers:
#
#   1. push: tags: ['*']
#      Fires on any tag push or force-push, from any branch.
#      Use for test builds: git push origin vX.Y.Z
#      Re-trigger: git push --force origin vX.Y.Z
#
#   2. release: types: [published]
#      Fires when you publish a release in the GitHub UI.
#
# Artifacts:
#   EDLD-{version}.tar.gz / .sig
#   EDLD-{version}.sha256 / .sig
#
# Secrets required:
#   SIGNING_KEY       ed25519 private key, no passphrase
#   SIGNING_IDENTITY  email matching signing_key.pub

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

permissions:
  contents: write

env:
  VERSION:    ${{ github.event.release.tag_name || github.ref_name }}
  SIGNING_NS: edld.release

# ── Job 1: Source tarball ──────────────────────────────────────────────────────

jobs:
  source:
    name: Source tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}
          fetch-depth: 1

      - name: Verify version matches core/version
        run: |
          TAG="${{ env.VERSION }}"
          FILE_VER=$(cat core/version | tr -d '[:space:]')
          echo "Tag: $TAG  |  core/version: $FILE_VER"
          if [ "$TAG" != "$FILE_VER" ]; then
            echo "ERROR: tag '$TAG' does not match core/version '$FILE_VER'"
            exit 1
          fi

      - name: Create dist
        run: mkdir -p dist

      - name: Build source tarball
        run: |
          tar czf "dist/EDLD-${{ env.VERSION }}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='components/ksw' \
            --exclude='ksw-admin' \
            --exclude='allowlist.ksw' \
            --exclude='dist' \
            --transform "s|^\.|EDLD-${{ env.VERSION }}|" \
            .
          echo "Size: $(du -sh dist/EDLD-${{ env.VERSION }}.tar.gz | cut -f1)"

      - name: Sign tarball
        env:
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          KEY=$(mktemp); chmod 600 "$KEY"; echo "$SIGNING_KEY" > "$KEY"
          ssh-keygen -Y sign -f "$KEY" -n "${{ env.SIGNING_NS }}" \
            "dist/EDLD-${{ env.VERSION }}.tar.gz"
          rm -f "$KEY"
          ls -lh dist/

      - name: Save artifacts for checksums job
        uses: actions/upload-artifact@v6
        with:
          name: source-artifacts
          path: dist/EDLD-${{ env.VERSION }}.*
          if-no-files-found: error

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.VERSION }}" dist/* --clobber \
            2>/dev/null || echo "No matching release — artifacts available in Actions run"

# ── Job 2: Checksums ───────────────────────────────────────────────────────────

  checksums:
    name: Aggregate checksums
    runs-on: ubuntu-latest
    needs: [source]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}
          fetch-depth: 1

      - name: Download all artifacts from build jobs
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Remove any stale checksum/sig files before regenerating
        run: |
          mkdir -p dist
          rm -f dist/*.sha256 dist/*.sha256.sig
          ls -lh dist/

      - name: Generate unified SHA-256 file
        working-directory: dist
        run: |
          sha256sum EDLD-${{ env.VERSION }}* \
            | grep -v '\.sha256' \
            | grep -v '\.sig' \
            > EDLD-${{ env.VERSION }}.sha256
          echo ""
          cat EDLD-${{ env.VERSION }}.sha256

      - name: Sign checksum file
        env:
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          KEY=$(mktemp); chmod 600 "$KEY"; echo "$SIGNING_KEY" > "$KEY"
          ssh-keygen -Y sign -f "$KEY" -n "${{ env.SIGNING_NS }}" \
            "dist/EDLD-${{ env.VERSION }}.sha256"
          rm -f "$KEY"

      - name: Verify all signatures
        env:
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          KEY=$(mktemp); chmod 600 "$KEY"; echo "$SIGNING_KEY" > "$KEY"
          PUB=$(ssh-keygen -y -f "$KEY")
          rm -f "$KEY"
          ALLOWED=$(mktemp)
          echo "${{ env.SIGNING_IDENTITY }} namespaces=\"${{ env.SIGNING_NS }}\" $PUB" > "$ALLOWED"
          FAIL=0
          for sig in dist/*.sig; do
            artifact="${sig%.sig}"
            [ -f "$artifact" ] || continue
            echo -n "Verifying $artifact ... "
            if ssh-keygen -Y verify \
                -f "$ALLOWED" -I "${{ env.SIGNING_IDENTITY }}" \
                -n "${{ env.SIGNING_NS }}" -s "$sig" < "$artifact" 2>/dev/null; then
              echo "OK"
            else
              echo "FAILED"; FAIL=1
            fi
          done
          rm -f "$ALLOWED"
          [ "$FAIL" -eq 0 ] || { echo "Signature verification failed"; exit 1; }
          echo "All signatures OK."

      - name: Upload checksums and sigs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.VERSION }}" \
            dist/EDLD-${{ env.VERSION }}.sha256 \
            dist/EDLD-${{ env.VERSION }}.sha256.sig \
            --clobber 2>/dev/null \
            || echo "No matching release — checksums available in Actions run"
          for f in dist/*.sig; do
            [ -f "$f" ] && gh release upload "${{ env.VERSION }}" "$f" \
              --clobber 2>/dev/null || true
          done
